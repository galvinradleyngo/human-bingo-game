'<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Human Bingo Game</title>\n</head>\n<body>\n    <header>\n        <h1>Welcome to the Human Bingo Game!</h1>\n        <button id="retrieveSavedGames">Retrieve Saved Games</button>\n    </header>\n    <main>\n        <h2>Play the Game</h2>\n        <!-- Game UI goes here -->\n    </main>\n    <script>\n        document.getElementById('retrieveSavedGames').addEventListener('click', function() {\n            const savedGames = Object.keys(localStorage).filter(key => key.startsWith('humanBingo_'));\n            const gameList = savedGames.map(key => `\n                <li data-game-id="${key}">${key}</li>`).join('');\n            const modalContent = `<div class='modal'><ul>${gameList}</ul><button class='close'>Close</button></div>`;\n            document.body.insertAdjacentHTML('beforeend', modalContent);\n            document.querySelectorAll('li').forEach(item => {\n                item.addEventListener('click', function() {\n                    const gameId = this.getAttribute('data-game-id');\n                    loadSavedProgress(gameId);\n                    if (gameId.includes('custom')) {\n                        window.location.href = `?game=${gameId}`;\n                    }\n                });\n            });\n            document.querySelector('.close').addEventListener('click', function() {\n                document.querySelector('.modal').remove();\n            });\n        });\n        function loadSavedProgress(gameId) {\n            // Logic to load the game progress goes here\n            console.log(`Loading progress for: ${gameId}`);\n        }\n    </script>\n</body>\n</html>'
