<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Bingo Game</title>
</head>
<body>
    <div id="app"></div>
    <button id="savedGamesButton">Saved Games</button>
    <div id="savedGamesModal" style="display:none;">
        <h2>Saved Games</h2>
        <ul id="savedGamesList"></ul>
        <button id="closeModalButton">Close</button>
    </div>
    <script src="path/to/react.js"></script>
    <script>
        // Logic to manage saved games
        const savedGamesButton = document.getElementById('savedGamesButton');
        const savedGamesModal = document.getElementById('savedGamesModal');
        const savedGamesList = document.getElementById('savedGamesList');

        savedGamesButton.addEventListener('click', () => {
            savedGamesModal.style.display = 'block';
            loadSavedGames();
        });

        document.getElementById('closeModalButton').addEventListener('click', () => {
            savedGamesModal.style.display = 'none';
        });

        function loadSavedGames() {
            // Load localStorage keys starting with 'humanBingo_'
            const keys = Object.keys(localStorage).filter(key => key.startsWith('humanBingo_'));
            savedGamesList.innerHTML = '';
            keys.forEach(key => {
                const li = document.createElement('li');
                li.textContent = key;
                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Delete';
                deleteButton.onclick = () => {
                    localStorage.removeItem(key);
                    loadSavedGames();
                };
                li.appendChild(deleteButton);
                savedGamesList.appendChild(li);
            });
        }
    </script>
</body>
</html>
